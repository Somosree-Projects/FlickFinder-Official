<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlickFinder - Create Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a0f0f 0%, #2d1f1f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%),
                        url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><path fill="%23FF4B2B" opacity="0.1" d="M45.3,-76.3C59.9,-69.9,73.5,-59.2,80.9,-45.1C88.3,-31,89.5,-13.5,87.7,3.3C85.8,20.1,81,36.2,71.6,48.8C62.3,61.4,48.5,70.6,33.7,75.3C18.9,80.1,3.1,80.4,-12.4,77.6C-27.9,74.8,-43.1,68.9,-56.8,59.5C-70.5,50,-82.7,37,-87.7,21.5C-92.7,6,-90.4,-12,-84.1,-28.2C-77.8,-44.3,-67.5,-58.6,-53.8,-65.4C-40.1,-72.2,-23,-71.5,-6.3,-62.1C10.5,-52.7,30.7,-82.7,45.3,-76.3Z" transform="translate(100 100)" /></svg>');
            background-size: cover;
            opacity: 0.1;
            z-index: -1;
            animation: pulse 15s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .signup-container {
            background: rgba(28, 28, 28, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 87, 34, 0.1);
            position: relative;
        }

        .logo {
            color: #ff5722;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .welcome-text {
            color: #fff;
            margin-bottom: 30px;
            font-size: 1.1em;
            opacity: 0.9;
        }

        .form-group {
            position: relative;
            margin-bottom: 25px;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff5722;
            font-size: 1.2em;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(51, 51, 51, 0.8);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #ff5722;
            background: rgba(51, 51, 51, 0.95);
            box-shadow: 0 0 15px rgba(255, 87, 34, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #ff5722, #ff7043);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: linear-gradient(45deg, #ff7043, #ff5722);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 87, 34, 0.4);
        }

        .links {
            margin-top: 25px;
            color: #fff;
            font-size: 0.95em;
        }

        .links a {
            color: #ff5722;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: #ff7043;
            text-decoration: underline;
        }

        .password-requirements {
            color: #999;
            font-size: 0.85em;
            text-align: left;
            margin-top: 5px;
            padding-left: 45px;
        }

        .social-signup {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .social-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 480px) {
            .signup-container {
                padding: 20px;
            }

            .logo {
                font-size: 28px;
            }

            input {
                font-size: 14px;
            }

            button {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="logo">FlickFinder</div>
        <p class="welcome-text">Join our community to watch unlimited movies and TV shows</p>
        
        <form action="signup.php" method="POST" onsubmit="return validateForm()">
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" name="fullName" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" id="password" placeholder="Create Password" required>
                <div class="password-requirements">
                    Must be at least 8 characters long
                </div>
            </div>
            <div class="form-group">
                <i class="fas fa-shield-alt"></i>
                <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Confirm Password" required>
            </div>
            <button type="submit">Create Account</button>
        </form>

        <div class="links">
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>

    </div>

    <script>
        function validateForm() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password.length < 8) {
                alert('Password must be at least 8 characters long');
                return false;
            }

            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return false;
            }

            return true;
        }
    </script>
</body>
</html>
